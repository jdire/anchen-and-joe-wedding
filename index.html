<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Wedding of Anchen &amp; Joe — 4th September 2027</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Raleway:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <style>
    /* ─── Design Tokens ─────────────────────────────────────────── */
    :root {
      --cream:       #FAF7EE;
      --cream-dark:  #F0EBD8;
      --teal:        #019CA6;
      --teal-light:  #2DB3BC;
      --teal-pale:   #D4E8E8;
      --gold:        #BF9B3A;
      --gold-light:  #D4B45A;
      --dark:        #252828;
      --dark-mid:    #4A4F4F;
      --dark-light:  #7A8080;
    }

    /* ─── Reset & Base ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background-color: var(--cream);
      color: var(--dark);
      font-family: 'Raleway', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Gradient Border Stripe ────────────────────────────────── */
    .stripe {
      height: 6px;
      background: linear-gradient(
        90deg,
        var(--teal)       0%,
        var(--teal-light) 30%,
        var(--gold-light) 50%,
        var(--teal-light) 70%,
        var(--teal)       100%
      );
    }

    /* ─── Page Layout ───────────────────────────────────────────── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 60px 40px 80px;
      min-height: calc(100vh - 12px);
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Corner ornaments */
    .page::before, .page::after {
      content: '';
      position: absolute;
      width: 100px;
      height: 100px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.35;
    }
    .page::before { top: 32px; left: 32px; border-width: 1px 0 0 1px; }
    .page::after  { bottom: 32px; right: 32px; border-width: 0 1px 1px 0; }

    /* ─── Header / Eyebrow ──────────────────────────────────────── */
    .eyebrow {
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.45em;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 28px;
      margin-top: 20px;
    }

    /* ─── Names ─────────────────────────────────────────────────── */
    .names-block {
      text-align: center;
      line-height: 1;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.8rem, 10vw, 7.5rem);
      font-weight: 300;
      font-style: italic;
      color: var(--dark);
      display: block;
    }

    .ampersand {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3rem, 8vw, 5.5rem);
      font-style: italic;
      font-weight: 300;
      color: var(--gold);
      display: block;
      line-height: 1.15;
    }

    /* ─── Ornamental Divider ─────────────────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 36px 0;
      width: 320px;
      max-width: 90vw;
    }
    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold) 60%);
    }
    .divider-line.r {
      background: linear-gradient(90deg, var(--gold) 40%, transparent);
    }
    .divider-gem {
      width: 9px; height: 9px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }
    .divider-dot {
      width: 4px; height: 4px;
      background: var(--teal);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ─── Date Banner ───────────────────────────────────────────── */
    .date-badge {
      background: var(--teal);
      color: var(--cream);
      padding: 14px 40px;
      text-align: center;
      margin-bottom: 44px;
    }
    .date-badge .day-name {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      opacity: 0.8;
      display: block;
      margin-bottom: 4px;
    }
    .date-badge .date-main {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 400;
      letter-spacing: 0.05em;
      display: block;
    }

    /* ─── Location Card ──────────────────────────────────────────── */
    .location-card {
      text-align: center;
      margin-bottom: 50px;
    }
    .location-card .castle-icon {
      margin-bottom: 14px;
      color: var(--gold);
      opacity: 0.8;
    }
    .location-card .venue-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 400;
      color: var(--teal);
      display: block;
      margin-bottom: 8px;
    }
    .location-card .address {
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--dark-mid);
      line-height: 1.9;
    }
    .map-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 18px;
      padding: 10px 26px;
      border: 1px solid var(--teal);
      color: var(--teal);
      text-decoration: none;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      transition: background 0.25s, color 0.25s;
    }
    .map-btn:hover, .map-btn:focus {
      background: var(--teal);
      color: var(--cream);
      outline: none;
    }

    /* ─── Countdown ──────────────────────────────────────────────── */
    .countdown-wrapper {
      text-align: center;
      margin-bottom: 16px;
    }
    .countdown-label {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--dark-light);
      margin-bottom: 24px;
    }
    .countdown {
      display: flex;
      align-items: flex-start;
      gap: 0;
      justify-content: center;
      flex-wrap: wrap;
    }
    .cd-item {
      text-align: center;
      padding: 0 22px;
      border-right: 1px solid var(--cream-dark);
    }
    .cd-item:last-child { border-right: none; }
    .cd-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 7vw, 4.5rem);
      font-weight: 300;
      color: var(--dark);
      line-height: 1;
      display: block;
      min-width: 2ch;
    }
    .cd-unit {
      font-size: 0.6rem;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      display: block;
      margin-top: 6px;
    }

    /* ─── Footer note ─────────────────────────────────────────────── */
    .footer-note {
      margin-top: auto;
      padding-top: 60px;
      text-align: center;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dark-light);
    }
    .footer-note strong {
      font-weight: 600;
      color: var(--teal);
    }

    /* ─── Responsive ─────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .page { padding: 40px 24px 60px; }
      .page::before, .page::after { width: 60px; height: 60px; }
      .cd-item { padding: 0 14px; }
    }
  </style>
</head>

<body>
  <div class="stripe"></div>

  <main class="page">

    <!-- Countdown -->
    <div class="countdown-wrapper">
      <p class="countdown-label">Days until we say &ldquo;I do&rdquo;</p>
      <div class="countdown" id="countdown" aria-live="polite" aria-atomic="false">
        <div class="cd-item">
          <span class="cd-num" id="cd-days" aria-label="days">—</span>
          <span class="cd-unit">Days</span>
        </div>
        <div class="cd-item">
          <span class="cd-num" id="cd-hours" aria-label="hours">—</span>
          <span class="cd-unit">Hours</span>
        </div>
        <div class="cd-item">
          <span class="cd-num" id="cd-mins" aria-label="minutes">—</span>
          <span class="cd-unit">Minutes</span>
        </div>
        <div class="cd-item">
          <span class="cd-num" id="cd-secs" aria-label="seconds">—</span>
          <span class="cd-unit">Seconds</span>
        </div>
      </div>
    </div>

    <!-- Ornamental divider -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-gem"></div>
      <div class="divider-dot"></div>
      <div class="divider-line r"></div>
    </div>

    <p class="eyebrow">The Wedding of</p>

    <!-- Names -->
    <div class="names-block" aria-label="Anchen Kehler and Joe Hollingshead">
      <span class="name">Anchen Kehler</span>
      <span class="ampersand">&amp;</span>
      <span class="name">Joe Hollingshead</span>
    </div>

    <!-- Ornamental divider -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-gem"></div>
      <div class="divider-dot"></div>
      <div class="divider-line r"></div>
    </div>

    <!-- Date -->
    <div class="date-badge">
      <span class="day-name">Saturday</span>
      <span class="date-main">4th September 2027</span>
    </div>

    <!-- Location -->
    <div class="location-card">
      <!-- Castle SVG icon -->
      <div class="castle-icon" aria-hidden="true">
        <svg width="48" height="40" viewBox="0 0 48 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="0"  y="12" width="8"  height="28" fill="currentColor" opacity="0.6"/>
          <rect x="40" y="12" width="8"  height="28" fill="currentColor" opacity="0.6"/>
          <rect x="0"  y="4"  width="8"  height="8"  fill="currentColor" opacity="0.4"/>
          <rect x="40" y="4"  width="8"  height="8"  fill="currentColor" opacity="0.4"/>
          <rect x="2"  y="0"  width="4"  height="6"  fill="currentColor"/>
          <rect x="42" y="0"  width="4"  height="6"  fill="currentColor"/>
          <rect x="10" y="16" width="28" height="24" fill="currentColor" opacity="0.5"/>
          <rect x="14" y="8"  width="20" height="10" fill="currentColor" opacity="0.4"/>
          <rect x="16" y="4"  width="4"  height="6"  fill="currentColor"/>
          <rect x="28" y="4"  width="4"  height="6"  fill="currentColor"/>
          <rect x="20" y="0"  width="8"  height="6"  fill="currentColor" opacity="0.7"/>
          <rect x="19" y="28" width="10" height="12" fill="var(--cream)" opacity="0.9"/>
        </svg>
      </div>

      <span class="venue-name">Devon</span>

      <a
        class="map-btn"
        href="https://maps.google.com/?q=Devon"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="View Devon on Google Maps"
      >
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
        View on Map
      </a>
    </div>

    <!-- Ornamental divider -->
    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-dot"></div>
      <div class="divider-gem"></div>
      <div class="divider-dot"></div>
      <div class="divider-line r"></div>
    </div>

    <!-- Footer note -->
    <p class="footer-note">
      More details to follow &nbsp;&middot;&nbsp;
      <strong>Anchen &amp; Joe &mdash; 2027</strong>
    </p>

  </main>

  <div class="stripe"></div>

  <script>
    (function () {
      // Wedding: Saturday 4 September 2027, 14:00 BST (13:00 UTC)
      var target = new Date('2027-09-04T13:00:00Z');

      function pad(n) { return String(n).padStart(2, '0'); }

      function tick() {
        var now  = new Date();
        var diff = target - now;

        if (diff <= 0) {
          document.getElementById('cd-days').textContent  = '0';
          document.getElementById('cd-hours').textContent = '00';
          document.getElementById('cd-mins').textContent  = '00';
          document.getElementById('cd-secs').textContent  = '00';
          return;
        }

        var days  = Math.floor(diff / 86400000);
        var hours = Math.floor((diff % 86400000) / 3600000);
        var mins  = Math.floor((diff % 3600000)  / 60000);
        var secs  = Math.floor((diff % 60000)    / 1000);

        document.getElementById('cd-days').textContent  = days.toLocaleString();
        document.getElementById('cd-hours').textContent = pad(hours);
        document.getElementById('cd-mins').textContent  = pad(mins);
        document.getElementById('cd-secs').textContent  = pad(secs);
      }

      tick();
      setInterval(tick, 1000);
    })();
  </script>
</body>
</html>
